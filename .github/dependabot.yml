version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain dependencies for NuGet (C#)
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain dependencies for pip (Python)
  - package-ecosystem: "pip"
    directory: "/src/MedEquity.ML"
    schedule:
      interval: "weekly"

  # Maintain dependencies for Docker (API)
  - package-ecosystem: "docker"
    directory: "/src/MedEquity.Api"
    schedule:
      interval: "weekly"

  # Maintain dependencies for Docker (ML Service)
  - package-ecosystem: "docker"
    directory: "/src/MedEquity.ML"
    schedule:
      interval: "weekly"
