name: .NET CI

on:
  push:
    branches: ["main"]
    paths:
      - "src/**/*.cs"
      - "src/**/*.csproj"
      - "*.sln"
  pull_request:
    branches: ["main"]
    paths:
      - "src/**/*.cs"
      - "src/**/*.csproj"
      - "*.sln"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore MedEquity.sln

      - name: Build
        run: dotnet build MedEquity.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test MedEquity.sln --no-build --verbosity normal --configuration Release
