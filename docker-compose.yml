services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medequity
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: src/MedEquity.Api/Dockerfile
    ports:
      - "5000:5000"
      - "5001:5001"
    depends_on:
      - postgres
      - redis
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=medequity;Username=postgres;Password=dev_password"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:5000"

  ml_service:
    build:
      context: .
      dockerfile: src/MedEquity.ML/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    environment:
      PYTHONUNBUFFERED: 1
      GEMINI_API_KEY: ${GEMINI_API_KEY}

volumes:
  postgres_data:
